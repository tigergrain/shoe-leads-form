<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titus Shoes — Leads Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1208;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --text-muted: #7A6A50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,168,76,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(139,69,19,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    animation: fadeDown 0.5s ease both;
  }

  .logo-circle {
    width: 88px;
    height: 88px;
    background: var(--dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(26,18,8,0.25), 0 0 0 4px rgba(201,168,76,0.2);
    font-size: 42px;
    transition: transform 0.3s ease;
    cursor: default;
  }

  .logo-circle:hover { transform: scale(1.06) rotate(-4deg); }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--dark);
    color: var(--gold);
    padding: 7px 20px;
    border-radius: 100px;
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .brand-badge .dot {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .container {
    width: 100%;
    max-width: 580px;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 6vw, 54px);
    color: var(--dark);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 36px;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 4px 6px rgba(26,18,8,0.04), 0 24px 64px rgba(26,18,8,0.1);
    border: 1px solid rgba(201,168,76,0.15);
  }

  .field { margin-bottom: 24px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    padding: 16px 20px;
    border: 1.5px solid #E8E0D0;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input::placeholder { color: #BFB49A; }

  input:focus, select:focus {
    border-color: var(--gold);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(201,168,76,0.1);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  button#submitBtn {
    width: 100%;
    padding: 20px 24px;
    background: var(--dark);
    color: var(--gold-light);
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  button#submitBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(201,168,76,0.18));
    pointer-events: none;
  }

  button#submitBtn:hover {
    background: #2D1F0A;
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(26,18,8,0.25);
  }

  button#submitBtn:active { transform: translateY(0); }

  button#submitBtn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }

  .btn-icon {
    width: 24px; height: 24px;
    background: rgba(201,168,76,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-box {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .status-box.success {
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.2);
    color: #166534;
    display: block;
  }

  .status-box.error {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    color: #991B1B;
    display: block;
  }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #BFB49A;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-circle">👠</div>
  <div class="brand-badge"><span class="dot"></span> Titus Shoes</div>
</div>

<div class="container" style="text-align: center;">
  <h1>Find Shoe<br>Store <em>Leads</em></h1>
  <p class="subtitle">Enter your search keyword and target location to find shoe store leads worldwide.</p>

  <div class="card">
    <div class="field">
      <label>Search Keyword</label>
      <input type="text" id="keyword" placeholder="e.g. women's sneaker store, luxury heels..." />
    </div>

    <div class="row">
      <div class="field">
        <label>Location</label>
        <input type="text" id="location" placeholder="e.g. Los Angeles, Bangkok Thailand, Tokyo Japan" />
      </div>
      <div class="field">
        <label>Max Results</label>
        <select id="maxResults">
          <option value="3">3 leads</option>
          <option value="5">5 leads</option>
          <option value="10" selected>10 leads</option>
          <option value="20">20 leads</option>
          <option value="50">50 leads</option>
          <option value="100">100 leads</option>
        </select>
      </div>
    </div>

    <button id="submitBtn" onclick="submitForm()">
      <span id="btnText">Search Request</span>
      <span class="spinner" id="spinner"></span>
      <div class="btn-icon" id="btnIcon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </button>

    <div class="status-box" id="statusBox"></div>
  </div>

  <p class="footer-note">Your search is processed securely. Results typically arrive in 1–3 minutes.</p>
</div>

<script>
  // ⚠️ REPLACE THIS with your actual n8n webhook URL
  const N8N_WEBHOOK_URL = "https://rocky51502.n8n-wsk.com/webhook/shoes-leads";

  async function submitForm() {
    const keyword = document.getElementById('keyword').value.trim();
    const location = document.getElementById('location').value.trim();
    const maxResults = document.getElementById('maxResults').value;

    if (!keyword) return showError("Please enter a search keyword.");
    if (!location) return showError("Please enter a location.");

    setLoading(true);

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword, location, maxResults: parseInt(maxResults) })
      });

      if (response.ok) {
        showSuccess(`✅ Request sent! Searching for <strong>${keyword}</strong> in <strong>${location}</strong>. Results will be ready shortly.`);
        document.getElementById('keyword').value = '';
        document.getElementById('location').value = '';
      } else {
        throw new Error(`Server responded with ${response.status}`);
      }
    } catch (err) {
      showError("Something went wrong. Please try again or contact support.");
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(state) {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const icon = document.getElementById('btnIcon');
    const text = document.getElementById('btnText');
    btn.disabled = state;
    spinner.style.display = state ? 'block' : 'none';
    icon.style.display = state ? 'none' : 'flex';
    text.textContent = state ? 'Sending...' : 'Search Request';
  }

  function showSuccess(msg) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box success';
    box.innerHTML = msg;
  }

  function showError(msg) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box error';
    box.innerHTML = '⚠️ ' + msg;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
  });
</script>
</body>
</html>
