<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Store Leads Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1208;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --rust: #8B4513;
    --text-muted: #7A6A50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(139,69,19,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--dark);
    color: var(--gold);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease both;
  }

  .brand-badge .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .container {
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 52px);
    color: var(--dark);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 4px 6px rgba(26,18,8,0.04), 0 20px 60px rgba(26,18,8,0.08);
    border: 1px solid rgba(201,168,76,0.15);
  }

  .field {
    margin-bottom: 22px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid #E8E0D0;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input::placeholder { color: #BFB49A; }

  input:focus, select:focus {
    border-color: var(--gold);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(201,168,76,0.1);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 6px 0 22px;
    color: var(--text-muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #E8E0D0;
  }

  .email-note {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 22px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .email-note svg { flex-shrink: 0; margin-top: 1px; }

  button {
    width: 100%;
    padding: 16px;
    background: var(--dark);
    color: var(--gold-light);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(201,168,76,0.15));
    pointer-events: none;
  }

  button:hover {
    background: #2D1F0A;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(26,18,8,0.2);
  }

  button:active { transform: translateY(0); }

  button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-box {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .status-box.success {
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.2);
    color: #166534;
    display: block;
  }

  .status-box.error {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    color: #991B1B;
    display: block;
  }

  .success-icon, .error-icon { font-size: 18px; margin-right: 6px; }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #BFB49A;
    letter-spacing: 0.3px;
  }

  .shoe-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    animation: fadeDown 0.5s ease both;
  }

  .api-section {
    background: #F9F6F0;
    border: 1.5px dashed #D8CDB8;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 24px;
  }

  .api-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .api-section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-saved-badge {
    font-size: 11px;
    background: rgba(34,197,94,0.1);
    color: #166534;
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 100px;
    padding: 2px 10px;
    display: none;
  }

  .api-saved-badge.visible { display: inline-block; }

  .api-key-wrapper {
    position: relative;
  }

  .api-key-wrapper input {
    padding-right: 48px;
    font-family: 'DM Mono', monospace, 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3px;
  }

  .toggle-visibility {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    width: auto;
    display: flex;
    align-items: center;
  }

  .toggle-visibility:hover { color: var(--dark); background: none; box-shadow: none; transform: translateY(-50%); }

  .api-hint {
    font-size: 12px;
    color: #BFB49A;
    margin-top: 8px;
    line-height: 1.5;
  }

  .api-hint a {
    color: var(--gold);
    text-decoration: none;
  }

  .api-hint a:hover { text-decoration: underline; }
</style>
</head>
<body>

<span class="shoe-icon">👠</span>
<div class="brand-badge"><span class="dot"></span> Leads Finder Tool</div>

<div class="container">
  <h1>Find Shoe<br>Store <em>Leads</em></h1>
  <p class="subtitle">Enter your search keyword and target location to find shoe store leads worldwide.</p>

  <div class="card">

    <div class="field">
      <label>Search Keyword</label>
      <input type="text" id="keyword" placeholder="e.g. women's sneaker store, luxury heels..." />
    </div>

    <div class="row">
      <div class="field">
        <label>City / Area</label>
        <input type="text" id="location" placeholder="e.g. Los Angeles, Bangkok Thailand, Tokyo Japan" />
      </div>
      <div class="field">
        <label>Max Results</label>
        <select id="maxResults">
          <option value="10">10 leads</option>
          <option value="20" selected>20 leads</option>
          <option value="50">50 leads</option>
          <option value="100">100 leads</option>
        </select>
      </div>
    </div>

    <button id="submitBtn" onclick="submitForm()">
      <span id="btnText">Send Leads Request</span>
      <span class="spinner" id="spinner"></span>
      <svg id="btnIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>

    <div class="status-box" id="statusBox"></div>
  </div>

  <p class="footer-note">Your search is processed securely. Results typically arrive in 1–3 minutes.</p>
</div>

<script>
  // ⚠️ REPLACE THIS with your actual n8n webhook URL
  const N8N_WEBHOOK_URL = "https://rocky51502.n8n-wsk.com/form-test/4cb8c6ff-5a5c-49af-97b8-70bdbfe459ea";

  // Load saved API key on page load
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('apify_api_key');
    if (saved) {
      document.getElementById('apifyKey').value = saved;
      document.getElementById('savedBadge').classList.add('visible');
    }
  });

  function onApiKeyInput() {
    const key = document.getElementById('apifyKey').value.trim();
    if (key) {
      localStorage.setItem('apify_api_key', key);
      document.getElementById('savedBadge').classList.add('visible');
    } else {
      localStorage.removeItem('apify_api_key');
      document.getElementById('savedBadge').classList.remove('visible');
    }
  }

  function toggleKeyVisibility() {
    const input = document.getElementById('apifyKey');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  async function submitForm() {
    const keyword = document.getElementById('keyword').value.trim();
    const location = document.getElementById('location').value.trim();
    const maxResults = document.getElementById('maxResults').value;

    if (!keyword) return showError("Please enter a search keyword.");
    if (!location) return showError("Please enter a city or area.");

    setLoading(true);

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword, location, maxResults: parseInt(maxResults) })
      });

      if (response.ok) {
        showSuccess(`✅ Search started! Looking for <strong>${keyword}</strong> stores in <strong>${location}</strong>. Your Google Sheet will be updated shortly.`);
        document.getElementById('keyword').value = '';
        document.getElementById('location').value = '';
      } else {
        throw new Error(`Server responded with ${response.status}`);
      }
    } catch (err) {
      showError("Something went wrong. Please try again or contact support.");
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(state) {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const icon = document.getElementById('btnIcon');
    const text = document.getElementById('btnText');
    btn.disabled = state;
    spinner.style.display = state ? 'block' : 'none';
    icon.style.display = state ? 'none' : 'block';
    text.textContent = state ? 'Sending...' : 'Send Leads Request';
  }

  function showSuccess(msg) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box success';
    box.innerHTML = msg;
  }

  function showError(msg) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box error';
    box.innerHTML = '⚠️ ' + msg;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
  });
</script>
</body>
</html>
